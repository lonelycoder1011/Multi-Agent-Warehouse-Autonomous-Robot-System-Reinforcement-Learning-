version: "3.9"

networks:
  warehouse-net:
    driver: bridge

volumes:
  checkpoints:
  logs:

services:
  # ── Ray Head (Training) ──────────────────────────────────────────────
  ray-head:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.training
    container_name: warehouse-ray-head
    command: ["ray", "start", "--head", "--port=6379", "--dashboard-host=0.0.0.0", "--block"]
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - RAY_DISABLE_MEMORY_MONITOR=1
    ports:
      - "8265:8265"   # Ray dashboard
      - "6379:6379"   # Ray head
    volumes:
      - checkpoints:/app/checkpoints
      - logs:/app/logs
    networks: [warehouse-net]
    restart: unless-stopped
    shm_size: "4gb"
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 30s
      retries: 5

  # ── Ray Workers ──────────────────────────────────────────────────────
  ray-worker:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.training
    command: ["ray", "start", "--address=ray-head:6379", "--num-cpus=4", "--block"]
    environment:
      - RAY_DISABLE_MEMORY_MONITOR=1
    depends_on:
      ray-head:
        condition: service_healthy
    networks: [warehouse-net]
    volumes:
      - checkpoints:/app/checkpoints
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "4", memory: 8G }
    restart: unless-stopped
    shm_size: "2gb"

  # ── Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.dashboard
    container_name: warehouse-dashboard
    ports:
      - "8080:8080"
    environment:
      - RAY_ADDRESS=ray-head:6379
      - CHECKPOINT_DIR=/checkpoints
    volumes:
      - checkpoints:/checkpoints:ro
    networks: [warehouse-net]
    depends_on: [ray-head]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      retries: 3

  # ── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: warehouse-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [warehouse-net]
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: warehouse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks: [warehouse-net]
    restart: unless-stopped
