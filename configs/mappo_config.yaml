# MAPPO Specific Configuration
mappo:
  # Network architecture
  actor:
    hidden_dims: [256, 256]
    activation: "tanh"
    use_orthogonal_init: true
    use_layer_norm: true
  
  critic:
    hidden_dims: [512, 512]
    activation: "tanh"
    use_orthogonal_init: true
    use_layer_norm: true
    use_global_state: true     # centralized critic
  
  # Communication
  communication:
    enabled: true
    message_dim: 32
    num_attention_heads: 4
    comm_rounds: 1
  
  # Parameter sharing
  parameter_sharing: true
  share_policy: "all_robots"   # all robots share same policy weights
  
  # Value normalization
  use_value_norm: true
  use_huber_loss: true
  huber_delta: 10.0
  
  # Curriculum
  curriculum:
    enabled: true
    phases:
      - name: "basic"
        num_robots: 5
        obstacle_density: 0.0
        order_deadline: null
        advance_threshold: 7.0
      - name: "intermediate"
        num_robots: 10
        obstacle_density: 0.15
        order_deadline: 100
        advance_threshold: 15.0
      - name: "advanced"
        num_robots: 15
        obstacle_density: 0.25
        order_deadline: 80
        advance_threshold: 25.0
      - name: "expert"
        num_robots: 20
        obstacle_density: 0.35
        order_deadline: 60
        advance_threshold: null

# PPO Training Hyperparameters
num_rollout_workers: 4
num_envs_per_worker: 2
train_batch_size: 8000
sgd_minibatch_size: 512
num_sgd_iter: 10
lr: 0.0003
gamma: 0.99
lambda_gae: 0.95
clip_param: 0.2
entropy_coeff: 0.02
vf_loss_coeff: 0.5
grad_clip: 10.0
num_gpus: 0
num_cpus_per_worker: 1
num_iterations: 500
checkpoint_freq: 50
save_dir: "./models/mappo"
fcnet_hiddens: [256, 256]
